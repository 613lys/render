apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: platform-charts
  namespace: flux-system
spec:
  interval: 10m
  url: https://artifactory.example.com/artifactory/helm
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: common-values
  namespace: app-prod
data:
  values.yaml: |
    replicaCount: 2
    appConfig:
      environment: common
      logLevel: info
      shared: from-common
      endpoint: https://common.example.test
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: environment-values
  namespace: app-prod
data:
  values.yaml: |
    replicaCount: 5
    appConfig:
      environment: prod
      endpoint: https://prod.example.test
---
apiVersion: v1
kind: Secret
metadata:
  name: secret-values
  namespace: app-prod
type: Opaque
data:
  values.yaml: YXBwQ29uZmlnOgogIHRva2VuOiBwcm9kLXRva2VuCg==
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: demo
  namespace: app-prod
spec:
  interval: 10m
  releaseName: demo-prod
  targetNamespace: workload-prod
  chart:
    spec:
      chart: demo-app
      version: 1.2.3
      sourceRef:
        kind: HelmRepository
        name: platform-charts
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: common-values
    - kind: ConfigMap
      name: environment-values
    - kind: Secret
      name: secret-values
  values:
    replicaCount: 6
    appConfig:
      logLevel: warn
      inlineOnly: prod-inline
